name: my_calendar_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4  # ← Здесь только настройки версии SDK!

# =====================================================
# ЗАВИСИМОСТИ ПРОЕКТА (то, что нужно для работы приложения)
# =====================================================
dependencies:
  flutter:
    sdk: flutter

  # Пакет для красивого календаря
  table_calendar: ^3.1.1
  
  # Пакет для локальной базы данных
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Пакет для озвучивания текста (TTS)
  flutter_tts: ^3.8.3
  
  # Иконки в стиле iOS
  cupertino_icons: ^1.0.8

# =====================================================
# ИНСТРУМЕНТЫ РАЗРАБОТЧИКА (только для отладки и тестов)
# =====================================================
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # 🔧 Если будете использовать генерацию кода для Hive, раскомментируйте:
  # build_runner: ^2.4.0
  # hive_generator: ^2.0.0

# =====================================================
# НАСТРОЙКИ FLUTTER
# =====================================================
flutter:
  uses-material-design: true

  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg